<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Step05 Grid</title>
    <style>
      .grid {
        display: grid;
        grid-template-columns: 200px 1fr;
        grid-template-rows: 60px 1fr 40px;
        grid-template-areas:
          "header header"
          "side main"
          "footer footer";
        min-height: 300px;
        gap: 8px;
      }
      .header { grid-area: header; background: #ddd; }
      .side { grid-area: side; background: #eee; }
      .main { grid-area: main; background: #f5f5f5; }
      .footer { grid-area: footer; background: #ddd; }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="header">header</div>
      <div class="side">side</div>
      <div class="main">main</div>
      <div class="footer">footer</div>
    </div>
  </body>
</html>
