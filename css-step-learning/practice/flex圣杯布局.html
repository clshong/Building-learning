<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex Layout</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body,
      html {
        width: 100%;
        height: 100%;
      }

      .page-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .header {
        height: 50px;
        background-color: #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .footer {
        height: 50px;
        background-color: #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .main-content {
        flex: 1;
        display: flex;
      }

      .left,
      .right {
        width: 50px;
        background-color: red;
      }
      .content {
        flex: 1;
        background-color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <div class="header">头部</div>

      <div class="main-content">
        <div class="left"></div>
        <div class="content">内容区域</div>
        <div class="right"></div>
      </div>

      <div class="footer">页脚</div>
    </div>
  </body>
</html>
