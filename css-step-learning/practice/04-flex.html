<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Step04 Flex</title>
    <style>
      .layout { display: flex; gap: 8px; }
      .left, .right { width: 120px; background: #ddd; }
      .center { flex: 1; background: #eee; }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="left">left</div>
      <div class="center">center</div>
      <div class="right">right</div>
    </div>
  </body>
</html>
