<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      .box {
        width: 100%;
        height: 100%;
      }
      .box-header {
        width: 100%;
        height: 50px;
        background-color: #ccc;
        position: sticky;
        top: 0;
      }
      .box-content {
        width: 100%;
        height: 4000px;
        background-color: #eee;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="box-header">头部</div>
      <div class="box-content">内容</div>
    </div>
  </body>
</html>
